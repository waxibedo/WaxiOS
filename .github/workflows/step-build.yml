name: Step Build

on:
  push:
    branches: [main]

jobs:
  step1:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-common mtools bc wget curl unzip imagemagick
          echo "Step 1 done"

  step2:
    runs-on: ubuntu-latest
    needs: step1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build directories
        run: |
          mkdir -p waxios/chroot waxios/iso/casper
          echo "Step 2 done"

  step3:
    runs-on: ubuntu-latest
    needs: step2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Debootstrap
        run: |
          sudo debootstrap --variant=minbase --arch=amd64 noble waxios/chroot http://archive.ubuntu.com/ubuntu/
          echo "Step 3 done"

  step4:
    runs-on: ubuntu-latest
    needs: step3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Customize
        run: |
          sudo chroot waxios/chroot /bin/bash -c "
            echo waxios > /etc/hostname
            apt-get update -qq
            apt-get install -y linux-image-generic ubuntu-desktop firefox plymouth plymouth-theme-ubuntu-logo gnome-shell gdm3 vlc
          "
          echo "Step 4 done"

  step5:
    runs-on: ubuntu-latest
    needs: step4
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create theme
        run: |
          sudo mkdir -p waxios/chroot/usr/share/plymouth/themes/waxios
          sudo bash -c 'cd waxios/chroot/usr/share/plymouth/themes/waxios
            convert -size 1920x1080 gradient:#0f0f23:#1a1a3e bg.png
            convert -size 400x80 xc:none -font DejaVu-Sans-Bold -pointsize 36 -fill #00d4ff -gravity center -annotate +0+0 WaxicOS logo.png
          '
          echo "Step 5 done"

  step6:
    runs-on: ubuntu-latest
    needs: step5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create squashfs
        run: |
          sudo mksquashfs waxios/chroot waxios/iso/casper/filesystem.squashfs -e dev proc sys run
          ls -lh waxios/iso/casper/
          echo "Step 6 done"

  step7:
    runs-on: ubuntu-latest
    needs: step6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy kernel
        run: |
          sudo cp waxios/chroot/boot/vmlinuz-* waxios/iso/casper/vmlinuz
          sudo cp waxios/chroot/boot/initrd.img-* waxios/iso/casper/initrd
          echo "Step 7 done"

  step8:
    runs-on: ubuntu-latest
    needs: step7
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create GRUB config
        run: |
          mkdir -p waxios/iso/boot/grub/i386-pc
          cat > waxios/iso/boot/grub/grub.cfg << 'GRUB'
set default=0
set timeout=10
menuentry "WaxicOS GNU/Linux" {
    linux /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}
GRUB
          echo "Step 8 done"

  step9:
    runs-on: ubuntu-latest
    needs: step8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build ISO
        run: |
          cd waxios/iso
          sudo xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -V WAXIOS \
            -eltorito-boot boot/grub/i386-pc/boot.img -no-emul-boot -boot-load-size 4 -boot-info-table \
            --eltorito-catalog boot/grub/boot.cat --grub2-boot-info --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -output $GITHUB_WORKSPACE/WaxiOS-1.0.iso .
          ls -lh $GITHUB_WORKSPACE/WaxiOS-1.0.iso
          echo "Step 9 done"

  upload:
    runs-on: ubuntu-latest
    needs: step9
    steps:
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: WaxiOS-ISO
          path: WaxiOS-1.0.iso
          retention-days: 7