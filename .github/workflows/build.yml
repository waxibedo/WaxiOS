name: Build WaxiOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create directories
        run: |
          mkdir -p .github/workflows
          mkdir -p scripts

      - name: Create build script
        run: |
          cat > scripts/build.sh << 'ENDSCRIPT'
#!/bin/bash
set -e
export DEBIAN_FRONTEND=noninteractive

echo "============================================"
echo "  WaxiOS Build Script v1.0"
echo "============================================"

cd "$GITHUB_WORKSPACE"

echo "[1/8] Installing packages..."
apt-get update -qq
apt-get install -y -qq debootstrap squashfs-tools xorriso grub-pc-bin grub-common mtools dosfstools bc wget curl unzip imagemagick

echo "[2/8] Creating base system..."
mkdir -p waxios-build
cd waxios-build
debootstrap --variant=minbase --arch=amd64 noble waxios-chroot http://archive.ubuntu.com/ubuntu/

echo "[3/8] Customizing system..."
mount -t proc proc waxios-chroot/proc
mount -t sysfs sys waxios-chroot/sys
mount -o bind /dev waxios-chroot/dev

chroot waxios-chroot /bin/bash << 'CHROOTEOF'
set -e
export DEBIAN_FRONTEND=noninteractive

echo "waxios" > /etc/hostname
cat > /etc/hosts << 'EOF'
127.0.0.1 localhost
127.0.1.1 waxios
::1 localhost ip6-localhost ip6-loopback
EOF

add-apt-repository -y universe
apt-get update -qq
apt-get install -y -qq linux-image-generic ubuntu-desktop-minimal firefox plymouth plymouth-theme-ubuntu-logo gnome-shell gdm3 language-pack-tr-base vlc

mkdir -p /usr/share/plymouth/themes/waxios

cat > /usr/share/plymouth/themes/waxios/waxios.plymouth << 'PTHEME'
[Plymouth Theme]
Name=WaxiOS
Description=WaxiOS Boot Theme
ModuleName=script

[script]
ImageDir=/usr/share/plymouth/themes/waxios
ScriptFile=/usr/share/plymouth/themes/waxios/waxios.script
PTHEME

cat > /usr/share/plymouth/themes/waxios/waxios.script << 'PSCRIPT'
bg = Image("bg.png");
bg.Scale(Window.GetWidth(), Window.GetHeight());
bg.Draw(0, 0);
logo = Image("logo.png");
logo_pos_x = (Window.GetWidth() - logo.GetWidth()) / 2;
logo_pos_y = (Window.GetHeight() - logo.GetHeight()) / 2 - 50;
logo.Draw(logo_pos_x, logo_pos_y);
PSCRIPT

cd /usr/share/plymouth/themes/waxios
convert -size 1920x1080 gradient:"#0f0f23:#1a1a3e" bg.png
convert -size 400x80 xc:none -font DejaVu-Sans-Bold -pointsize 36 -fill "#00d4ff" -gravity center -annotate +0+0 "WaxicOS" logo.png

cat > /etc/default/grub << 'GRUBEOF'
GRUB_DEFAULT=0
GRUB_TIMEOUT_STYLE=hidden
GRUB_TIMEOUT=10
GRUB_DISTRIBUTOR="WaxicOS"
GRUB_CMDLINE_LINUX_DEFAULT="quiet splash"
GRUB_GFXMODE=1920x1080
GRUB_GFXPAYLOAD_LINUX=keep
GRUBEOF

update-grub
update-alternatives --install /usr/share/plymouth/themes/default.plymouth default.plymouth /usr/share/plymouth/themes/waxios/waxios.plymouth 100
update-alternatives --set default.plymouth /usr/share/plymouth/themes/waxios/waxios.plymouth
CHROOTEOF

umount waxios-chroot/dev
umount waxios-chroot/sys
umount waxios-chroot/proc

echo "[4/8] Creating ISO structure..."
cd ..
mkdir -p waxios-iso/boot/grub
mkdir -p waxios-iso/casper

echo "[5/8] Creating squashfs..."
mksquashfs waxios-build/waxios-chroot waxios-iso/casper/filesystem.squashfs -quiet

echo "[6/8] Setting up boot..."
cp waxios-build/waxios-chroot/boot/vmlinuz-* waxios-iso/casper/vmlinuz 2>/dev/null || true
cp waxios-build/waxios-chroot/boot/initrd.img-* waxios-iso/casper/initrd 2>/dev/null || true

cat > waxios-iso/boot/grub/grub.cfg << 'GRUBCFG'
set default=0
set timeout=10
menuentry "WaxicOS GNU/Linux" {
    set gfxpayload=keep
    linux /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}
menuentry "WaxicOS GNU/Linux (safe graphics)" {
    set gfxpayload=keep
    linux /casper/vmlinuz boot=casper nomodeset ---
    initrd /casper/initrd
}
GRUBCFG

cp waxios-build/waxios-chroot/usr/share/plymouth/themes/waxios/bg.png waxios-iso/ 2>/dev/null || true

chroot waxios-build/waxios-chroot dpkg-query -W --showformat='${Package} ${Version}' > waxios-iso/casper/filesystem.manifest

echo "[7/8] Building ISO..."
cd waxios-iso

xorriso -as mkisofs \
    -iso-level 3 \
    -full-iso9660-filenames \
    -V "WaxicOS" \
    -cache-inodes \
    -eltorito-boot boot/grub/i386-pc/boot.img \
    -no-emul-boot \
    -boot-load-size 4 \
    -boot-info-table \
    --eltorito-catalog boot/grub/boot.cat \
    --grub2-boot-info \
    --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
    -output ../WaxiOS-1.0.iso \
    .

echo "[8/8] Compressing..."
mv WaxiOS-1.0.iso WaxiOS-1.0-original.iso
xz -9 -k WaxiOS-1.0-original.iso
mv WaxiOS-1.0-original.iso.xz WaxiOS-1.0.iso.xz

echo "============================================"
echo "  Build Complete!"
echo "  File: WaxiOS-1.0.iso.xz"
du -h WaxiOS-1.0.iso.xz
echo "============================================"
ENDSCRIPT
          chmod +x scripts/build.sh

      - name: Run build
        run: bash scripts/build.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: WaxiOS-ISO
          path: WaxiOS-1.0.iso.xz
          retention-days: 7
