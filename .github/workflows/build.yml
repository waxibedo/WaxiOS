name: Build WaxiOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "=== System Info ==="
          uname -a
          cat /etc/os-release
          echo ""
          echo "=== Disk Space ==="
          df -h
          echo ""
          echo "=== Memory ==="
          free -h

      - name: Install packages
        run: |
          echo "Installing required packages..."
          sudo apt-get update -qq || echo "apt-get update failed"
          sudo apt-get install -y --no-install-recommends \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-pc-bin \
            grub-common \
            mtools \
            bc \
            wget \
            curl \
            unzip \
            imagemagick || { echo "Package install failed"; exit 1; }
          
          echo "=== Verifying installed tools ==="
          which debootstrap xorriso mksquashfs || { echo "Some tools not found"; exit 1; }

      - name: Create WaxiOS
        run: |
          set -e
          WORKSPACE="$GITHUB_WORKSPACE"
          cd "$WORKSPACE"
          
          echo "[1/5] Creating build directories..."
          mkdir -p waxios/chroot
          mkdir -p waxios/iso/casper
          mkdir -p waxios/iso/boot/grub/i386-pc
          
          echo "[2/5] Running debootstrap..."
          sudo debootstrap --variant=minbase --arch=amd64 noble waxios/chroot http://archive.ubuntu.com/ubuntu/ || { echo "Debootstrap failed"; exit 1; }
          
          echo "[3/5] Customizing system..."
          sudo chroot waxios/chroot /bin/bash -c "
            echo 'waxios' > /etc/hostname
            cat > /etc/hosts << 'EOF'
127.0.0.1 localhost
127.0.1.1 waxios
EOF
            apt-get update -qq
            apt-get install -y --no-install-recommends \
                linux-image-generic \
                ubuntu-desktop \
                firefox \
                plymouth \
                plymouth-theme-ubuntu-logo \
                gnome-shell \
                gdm3 \
                vlc \
                language-pack-tr-base || { echo 'Packages failed'; exit 1; }
          "
          
          echo "[4/5] Creating Plymouth theme..."
          sudo mkdir -p waxios/chroot/usr/share/plymouth/themes/waxios
          sudo bash -c 'cd waxios/chroot/usr/share/plymouth/themes/waxios
            convert -size 1920x1080 gradient:"#0f0f23:#1a1a3e" bg.png
            convert -size 400x80 xc:none -font DejaVu-Sans-Bold -pointsize 36 -fill "#00d4ff" -gravity center -annotate +0+0 "WaxicOS" logo.png
            cat > waxios.plymouth << '\''PTHEME'\''
[Plymouth Theme]
Name=WaxiOS
Description=WaxiOS Boot Theme
ModuleName=script
[script]
ImageDir=/usr/share/plymouth/themes/waxios
ScriptFile=/usr/share/plymouth/themes/waxios/waxios.script
PTHEME
            cat > waxios.script << '\''PSCRIPT'\''
bg = Image("bg.png");
bg.Scale(Window.GetWidth(), Window.GetHeight());
bg.Draw(0, 0);
logo = Image("logo.png");
lx = (Window.GetWidth() - logo.GetWidth()) / 2;
ly = (Window.GetHeight() - logo.GetHeight()) / 2 - 50;
logo.Draw(lx, ly);
PSCRIPT
          '
          
          echo "[5/5] Building ISO..."
          sudo mksquashfs waxios/chroot waxios/iso/casper/filesystem.squashfs -e dev proc sys run
          sudo cp waxios/chroot/boot/vmlinuz-* waxios/iso/casper/vmlinuz 2>/dev/null || true
          sudo cp waxios/chroot/boot/initrd.img-* waxios/iso/casper/initrd 2>/dev/null || true
          
          sudo bash -c 'cd waxios/iso
            cat > boot/grub/grub.cfg << '\''GRUB'\''
set default=0
set timeout=10
menuentry "WaxicOS GNU/Linux" {
    linux /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}
menuentry "WaxicOS GNU/Linux (safe mode)" {
    linux /casper/vmlinuz boot=casper nomodeset ---
    initrd /casper/initrd
}
GRUB
            cp ../chroot/usr/share/plymouth/themes/waxios/bg.png . 2>/dev/null || true
          '
          
          echo "Creating ISO..."
          cd waxios/iso
          sudo xorriso -as mkisofs \
            -iso-level 3 \
            -full-iso9660-filenames \
            -V "WaxicOS" \
            -eltorito-boot boot/grub/i386-pc/boot.img \
            -no-emul-boot \
            -boot-load-size 4 \
            -boot-info-table \
            --eltorito-catalog boot/grub/boot.cat \
            --grub2-boot-info \
            --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -output "$WORKSPACE/WaxiOS-1.0.iso" . || { echo "xorriso failed"; exit 1; }
          
          echo "=== Build Complete ==="
          ls -lh "$WORKSPACE/WaxiOS-1.0.iso"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: WaxiOS-ISO
          path: WaxiOS-1.0.iso
          retention-days: 7

      - name: Show ISO size
        run: |
          if [ -f WaxiOS-1.0.iso ]; then
            echo "=== ISO Details ==="
            ls -lh WaxiOS-1.0.iso
            echo "Size in MB: $(du -m WaxiOS-1.0.iso | cut -f1)"
          fi
