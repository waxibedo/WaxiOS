name: Build WaxiOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug environment
        run: |
          echo "=== System Info ==="
          uname -a
          cat /etc/os-release
          df -h

      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends debootstrap squashfs-tools xorriso grub-pc-bin grub-common mtools bc wget curl unzip imagemagick
          which debootstrap xorriso mksquashfs

      - name: Build WaxiOS
        run: |
          set -e
          WORKSPACE="$GITHUB_WORKSPACE"
          cd ""
          
          mkdir -p waxios/chroot waxios/iso/casper waxios/iso/boot/grub/i386-pc
          
          sudo debootstrap --variant=minbase --arch=amd64 noble waxios/chroot http://archive.ubuntu.com/ubuntu/
          
          sudo chroot waxios/chroot /bin/bash -c "
            echo 'waxios' > /etc/hostname
            echo '127.0.0.1 localhost waxios' > /etc/hosts
            apt-get update -qq
            apt-get install -y --no-install-recommends linux-image-generic ubuntu-desktop firefox plymouth plymouth-theme-ubuntu-logo gnome-shell gdm3 vlc
          "
          
          sudo mkdir -p waxios/chroot/usr/share/plymouth/themes/waxios
          sudo bash -c 'cd waxios/chroot/usr/share/plymouth/themes/waxios
            convert -size 1920x1080 gradient:"#0f0f23:#1a1a3e" bg.png
            convert -size 400x80 xc:none -font DejaVu-Sans-Bold -pointsize 36 -fill "#00d4ff" -gravity center -annotate +0+0 "WaxicOS" logo.png
            cat > waxios.plymouth << 'PTHEME'
[Plymouth Theme]
Name=WaxiOS
Description=WaxiOS Boot Theme
ModuleName=script
[script]
ImageDir=/usr/share/plymouth/themes/waxios
ScriptFile=/usr/share/plymouth/themes/waxios/waxios.script
PTHEME
            cat > waxios.script << PSCRIPT
bg = Image("bg.png");
bg.Scale(Window.GetWidth(), Window.GetHeight());
bg.Draw(0, 0);
logo = Image("logo.png");
lx = (Window.GetWidth() - logo.GetWidth()) / 2;
ly = (Window.GetHeight() - logo.GetHeight()) / 2 - 50;
logo.Draw(lx, ly);
PSCRIPT
          '
          
          sudo mksquashfs waxios/chroot waxios/iso/casper/filesystem.squashfs -e dev proc sys run
          sudo cp waxios/chroot/boot/vmlinuz-* waxios/iso/casper/vmlinuz 2>/dev/null || true
          sudo cp waxios/chroot/boot/initrd.img-* waxios/iso/casper/initrd 2>/dev/null || true
          
          sudo bash -c 'cd waxios/iso
            cat > boot/grub/grub.cfg << GRUB
set default=0
set timeout=10
menuentry "WaxicOS GNU/Linux" {
    linux /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}
menuentry "WaxicOS GNU/Linux (safe mode)" {
    linux /casper/vmlinuz boot=casper nomodeset ---
    initrd /casper/initrd
}
GRUB
            cp ../chroot/usr/share/plymouth/themes/waxios/bg.png . 2>/dev/null || true
          '
          
          cd waxios/iso
          sudo xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -V "WaxicOS" \
            -eltorito-boot boot/grub/i386-pc/boot.img -no-emul-boot -boot-load-size 4 -boot-info-table \
            --eltorito-catalog boot/grub/boot.cat --grub2-boot-info --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -output "/WaxiOS-1.0.iso" .
          
          ls -lh "/WaxiOS-1.0.iso"

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WaxiOS-ISO
          path: WaxiOS-1.0.iso
          retention-days: 7