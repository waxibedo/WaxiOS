name: Build WaxiOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug
        run: |
          echo "System: "
          cat /etc/os-release
          df -h

      - name: Install packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y debootstrap squashfs-tools xorriso grub-pc-bin grub-common mtools bc wget curl unzip imagemagick

      - name: Build WaxiOS
        run: |
          set -e
          cd $GITHUB_WORKSPACE
          
          mkdir -p waxios/chroot waxios/iso/casper waxios/iso/boot/grub/i386-pc
          sudo debootstrap --variant=minbase --arch=amd64 noble waxios/chroot http://archive.ubuntu.com/ubuntu/
          
          sudo chroot waxios/chroot /bin/bash -c "
            echo waxios > /etc/hostname
            echo 127.0.0.1 localhost waxios > /etc/hosts
            apt-get update -qq
            apt-get install -y linux-image-generic ubuntu-desktop firefox plymouth plymouth-theme-ubuntu-logo gnome-shell gdm3 vlc
          "
          
          sudo mkdir -p waxios/chroot/usr/share/plymouth/themes/waxios
          sudo bash -c 'cd waxios/chroot/usr/share/plymouth/themes/waxios
            convert -size 1920x1080 gradient:#0f0f23:#1a1a3e bg.png
            convert -size 400x80 xc:none -font DejaVu-Sans-Bold -pointsize 36 -fill #00d4ff -gravity center -annotate +0+0 WaxicOS logo.png
            echo "[Plymouth Theme]" > waxios.plymouth
            echo "Name=WaxiOS" >> waxios.plymouth
            echo "Description=WaxiOS Boot Theme" >> waxios.plymouth
            echo "ModuleName=script" >> waxios.plymouth
            echo "" >> waxios.plymouth
            echo "[script]" >> waxios.plymouth
            echo "ImageDir=/usr/share/plymouth/themes/waxios" >> waxios.plymouth
            echo "ScriptFile=/usr/share/plymouth/themes/waxios/waxios.script" >> waxios.plymouth
            echo "bg = Image(""bg.png""); bg.Scale(Window.GetWidth(), Window.GetHeight()); bg.Draw(0, 0);" > waxios.script
            echo "logo = Image(""logo.png""); lx = (Window.GetWidth() - logo.GetWidth()) / 2; ly = (Window.GetHeight() - logo.GetHeight()) / 2 - 50; logo.Draw(lx, ly);" >> waxios.script
          '
          
          sudo mksquashfs waxios/chroot waxios/iso/casper/filesystem.squashfs -e dev proc sys run
          sudo cp waxios/chroot/boot/vmlinuz-* waxios/iso/casper/vmlinuz 2>/dev/null || true
          sudo cp waxios/chroot/boot/initrd.img-* waxios/iso/casper/initrd 2>/dev/null || true
          
          cat > waxios/iso/boot/grub/grub.cfg << 'GRUB'
set default=0
set timeout=10
menuentry "WaxicOS GNU/Linux" {
    linux /casper/vmlinuz boot=casper quiet splash ---
    initrd /casper/initrd
}
menuentry "WaxicOS GNU/Linux (safe)" {
    linux /casper/vmlinuz boot=casper nomodeset ---
    initrd /casper/initrd
}
GRUB
          
          cd waxios/iso
          sudo xorriso -as mkisofs -iso-level 3 -full-iso9660-filenames -V WAXIOS \
            -eltorito-boot boot/grub/i386-pc/boot.img -no-emul-boot -boot-load-size 4 -boot-info-table \
            --eltorito-catalog boot/grub/boot.cat --grub2-boot-info --grub2-mbr /usr/lib/grub/i386-pc/boot_hybrid.img \
            -output $GITHUB_WORKSPACE/WaxiOS-1.0.iso .
          
          ls -lh $GITHUB_WORKSPACE/WaxiOS-1.0.iso

      - name: Upload ISO
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WaxiOS-ISO
          path: WaxiOS-1.0.iso
          retention-days: 7