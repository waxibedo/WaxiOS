<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaxiOS v5.3 Platinum - Giant Core</title>
    
    <style>
        /* 1. CORE SYSTEM VARIABLES (SİSTEM DEĞİŞKENLERİ)
           ---------------------------------------------------------------------
           Tüm sistemin renk ve görsel kimlik parametreleri burada tanımlanmıştır.
        */
        :root {
            --primary-accent: #ff007a;
            --primary-accent-glow: rgba(255, 0, 122, 0.5);
            --system-bg-dark: #050505;
            --glass-surface: rgba(255, 255, 255, 0.03);
            --glass-edge: rgba(255, 255, 255, 0.1);
            --window-base-bg: #0f0f0f;
            --taskbar-base-bg: rgba(0, 0, 0, 0.96);
            --neon-glow-effect: 0 0 25px var(--primary-accent-glow);
            --depth-shadow: 0 50px 100px rgba(0,0,0,0.9);
            --font-family-core: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 2. GLOBAL RESET & BASE STYLES
           ---------------------------------------------------------------------
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
            outline: none;
        }

        html, body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: var(--font-family-core);
            background: var(--system-bg-dark);
            color: #ffffff;
            background-color: #000000;
        }

        /* 3. BOOT SEQUENCE STYLING (AÇILIŞ EKRANI)
           ---------------------------------------------------------------------
        */
        #boot-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 100000;
            background: #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.8s ease-in-out;
        }

        .loader-ring-system {
            width: 75px;
            height: 75px;
            border: 6px solid #111111;
            border-top: 6px solid var(--primary-accent);
            border-radius: 50%;
            animation: kernel-spin 1s linear infinite;
            margin-bottom: 35px;
            box-shadow: 0 0 25px var(--primary-accent-glow);
        }

        @keyframes kernel-spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .boot-status-label {
            letter-spacing: 18px;
            color: #ffffff;
            font-weight: 200;
            font-size: 1.3rem;
            text-transform: uppercase;
            animation: boot-text-pulse 2.5s infinite;
        }

        @keyframes boot-text-pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        /* 4. LOGIN INTERFACE (GİRİŞ EKRANI)
           ---------------------------------------------------------------------
        */
        #login-screen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') center/cover;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(15px);
            transition: opacity 1s ease;
        }

        .login-module-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(65px);
            padding: 85px;
            border-radius: 60px;
            border: 1px solid var(--glass-edge);
            text-align: center;
            width: 520px;
            box-shadow: 0 0 180px rgba(0,0,0,1), 0 0 60px var(--primary-accent-glow);
            transform: translateY(0);
        }

        .login-module-card h1 {
            font-size: 4.5rem;
            margin-bottom: 60px;
            letter-spacing: 15px;
            text-shadow: 0 0 35px var(--primary-accent);
            font-weight: 900;
            color: #ffffff;
        }

        .input-group-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .login-module-card input {
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            border: 1px solid var(--glass-edge);
            background: rgba(0,0,0,0.8);
            color: #ffffff;
            text-align: center;
            font-size: 1.3rem;
            transition: border 0.3s, box-shadow 0.3s;
        }

        .login-module-card input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 20px var(--primary-accent-glow);
        }

        .login-module-card button {
            width: 100%;
            padding: 22px;
            background: var(--primary-accent);
            color: #ffffff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 900;
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 6px;
            box-shadow: 0 0 40px var(--primary-accent-glow);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .login-module-card button:hover {
            letter-spacing: 8px;
            box-shadow: 0 0 60px var(--primary-accent);
            transform: scale(1.02);
        }

        /* 5. DESKTOP ENVIRONMENT (MASAÜSTÜ)
           ---------------------------------------------------------------------
        */
        #desktop-core {
            height: calc(100vh - 80px);
            width: 100%;
            display: none;
            padding: 70px;
            background: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072') center/cover;
            flex-direction: column;
            flex-wrap: wrap;
            gap: 55px;
            align-content: flex-start;
            position: relative;
        }

        .desktop-shortcut {
            width: 140px;
            height: 150px;
            text-align: center;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 25px;
            border-radius: 35px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .desktop-shortcut:hover {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(25px);
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        .desktop-shortcut span {
            font-size: 75px;
            display: block;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,1));
            margin-bottom: 20px;
        }

        .desktop-shortcut p {
            font-size: 16px;
            font-weight: 900;
            text-shadow: 0 5px 15px #000000;
            letter-spacing: 1.2px;
        }

        /* 6. WINDOWS SYSTEM (PENCERE MİMARİSİ)
           ---------------------------------------------------------------------
        */
        .system-window-frame {
            position: absolute;
            width: 1050px;
            height: 720px;
            background: var(--window-base-bg);
            border-radius: 40px;
            border: 1px solid var(--glass-edge);
            box-shadow: var(--depth-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: window-init-anim 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes window-init-anim {
            from { opacity: 0; transform: scale(0.92) translateY(60px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .window-header-drag-zone {
            padding: 28px 40px;
            background: rgba(255,255,255,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            border-bottom: 1px solid var(--glass-edge);
        }

        .window-title-label {
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #f1f1f1;
        }

        .window-action-buttons {
            display: flex;
            gap: 22px;
        }

        .action-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .action-dot:hover { transform: scale(1.3); }
        .dot-close { background: #ff5f56; box-shadow: 0 0 18px #ff5f56; }
        .dot-minimize { background: #ffbd2e; box-shadow: 0 0 18px #ffbd2e; }

        .window-internal-body {
            flex: 1;
            position: relative;
            background: #ffffff;
            width: 100%;
            height: 100%;
        }

        /* 7. SYSTEM TASKBAR (GÖREV ÇUBUĞU)
           ---------------------------------------------------------------------
        */
        #global-taskbar {
            height: 85px;
            background: var(--taskbar-base-bg);
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            align-items: center;
            padding: 0 60px;
            border-top: 1px solid var(--glass-edge);
            z-index: 10000;
            backdrop-filter: blur(40px);
        }

        #active-task-list {
            display: flex;
            gap: 20px;
            margin-left: 40px;
            flex: 1;
            overflow-x: auto;
            align-items: center;
        }

        #active-task-list::-webkit-scrollbar { display: none; }

        .taskbar-item-tab {
            padding: 14px 30px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--glass-edge);
            border-radius: 18px;
            cursor: pointer;
            font-weight: 900;
            font-size: 15px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #ffffff;
            white-space: nowrap;
        }

        .taskbar-item-tab:hover {
            background: var(--primary-accent);
            box-shadow: 0 0 25px var(--primary-accent-glow);
            transform: translateY(-5px);
        }

        .waxi-kernel-button {
            font-weight: 950;
            color: var(--primary-accent);
            font-size: 34px;
            letter-spacing: 6px;
            filter: drop-shadow(0 0 15px var(--primary-accent));
            margin-right: 45px;
            cursor: pointer;
            transition: 0.4s;
        }

        .waxi-kernel-button:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 25px var(--primary-accent));
        }

        .power-system-trigger {
            font-size: 34px;
            cursor: pointer;
            color: #ffffff;
            margin-right: 45px;
            transition: 0.6s;
        }

        .power-system-trigger:hover {
            color: #ff5f56;
            transform: rotate(180deg) scale(1.1);
        }

        #system-clock-display {
            color: white;
            font-weight: 900;
            margin-left: auto;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* 8. APP-SPECIFIC UI COMPONENTS
           ---------------------------------------------------------------------
        */
        .browser-container-root {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        .browser-nav-header {
            padding: 22px 35px;
            background: #1a1a1a;
            display: flex;
            gap: 30px;
            align-items: center;
            border-bottom: 3px solid #333333;
        }

        .url-input-field {
            flex: 1;
            background: #000000;
            border: 1px solid #444444;
            color: #ffffff;
            padding: 15px 30px;
            border-radius: 40px;
            outline: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .url-input-field:focus {
            border-color: var(--primary-accent);
        }

        .nav-execute-btn {
            background: var(--primary-accent);
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
        }

        .draw-app-root {
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1a1a;
        }

        .draw-toolbar-top {
            padding: 25px 45px;
            background: #111111;
            display: flex;
            gap: 35px;
            align-items: center;
            border-bottom: 2px solid #333333;
        }

        .draw-action-btn {
            background: #333333;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .draw-action-btn:hover { background: var(--primary-accent); }

        canvas.surface-canvas {
            background: #ffffff;
            cursor: crosshair;
            display: block;
            touch-action: none;
        }

        .player-root-interface {
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #151515 0%, #000 100%);
        }

        .player-visualizer-orb {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: var(--primary-accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            box-shadow: 0 0 70px var(--primary-accent-glow);
            animation: orb-pulse 2s infinite ease-in-out;
            margin-bottom: 40px;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.08); filter: brightness(1.2); }
        }
    </style>
</head>
<body>

    <section id="boot-screen">
        <div class="loader-ring-system"></div>
        <div class="boot-status-label">WAXiOS KERNEL LOADING...</div>
    </section>

    <section id="login-screen">
        <div class="login-module-card">
            <h1>WAXiOS</h1>
            <div class="input-group-wrapper">
                <input type="text" id="sys-auth-user" placeholder="Kullanıcı Adı" autocomplete="off">
                <input type="password" id="sys-auth-pass" placeholder="Parola">
                <button onclick="performKernelLogin()">Sistemi Başlat</button>
            </div>
        </div>
    </section>

    <main id="desktop-core">
        <div class="desktop-shortcut" ondblclick="initiateApplication('Google', 'https://www.google.com/search?igu=1')">
            <span>🌐</span><p>Google Search</p>
        </div>
        
        <div class="desktop-shortcut" ondblclick="initiateApplication('WaxiDraw', 'draw-module')">
            <span>🎨</span><p>WaxiDraw Pro</p>
        </div>
        
        <div class="desktop-shortcut" ondblclick="initiateApplication('WaxiMusic', 'audio-module')">
            <span>🎵</span><p>WaxiMusic</p>
        </div>
        
        <div class="desktop-shortcut" ondblclick="initiateApplication('Sistem Dosyaları', 'file-module')">
            <span>📂</span><p>Bilgisayarım</p>
        </div>
    </main>

    <footer id="global-taskbar">
        <div class="power-system-trigger" onclick="shutdownSequence()" title="Sistemi Kapat">⭕</div>
        <div class="waxi-kernel-button">WAXI</div>
        
        <div id="active-task-list">
            </div>
        
        <div id="system-clock-display">00:00:00</div>
    </footer>

    <script>
        /* ========================================================================
           WAXiOS JAVASCRIPT KERNEL ENGINE (v5.3)
           ------------------------------------------------------------------------
           CORE ARCHITECTURE: 
           - Window Management System
           - Proxy-Based Navigation (Bypass for Google-linked sites)
           - Dynamic Process Registry
           ========================================================================
        */

        // 1. KERNEL STATE VARIABLES
        // ------------------------------------------------------------------------
        let kernelZIndexBase = 1005;
        const uiTaskList = document.getElementById('active-task-list');
        const uiDesktop = document.getElementById('desktop-core');
        const uiLogin = document.getElementById('login-screen');
        const uiBoot = document.getElementById('boot-screen');

        /**
         * 2. INITIAL BOOT SEQUENCE
         * Sistem donanımını ve arayüzünü hazır hale getirir.
         */
        window.onload = function() {
            console.log("[WAXiOS KERNEL]: Donanım taraması başlatıldı...");
            
            setTimeout(() => {
                uiBoot.style.opacity = '0';
                setTimeout(() => {
                    uiBoot.style.display = 'none';
                    uiLogin.style.display = 'flex';
                    console.log("[WAXiOS KERNEL]: Giriş katmanı hazır.");
                }, 1800);
            }, 3000);
        };

        /**
         * 3. AUTHENTICATION HANDLER
         * Kullanıcı girişini kontrol eden ana güvenlik fonksiyonu.
         */
        function performKernelLogin() {
            const userIn = document.getElementById('sys-auth-user').value;
            const passIn = document.getElementById('sys-auth-pass').value;

            // KERNEL CREDENTIAL CHECK
            if (userIn === "WaxiOS" && passIn === "123456") {
                console.log("[WAXiOS KERNEL]: Kimlik doğrulandı. Masaüstü yükleniyor...");
                uiLogin.style.display = 'none';
                uiDesktop.style.display = 'flex';
            } else {
                console.warn("[WAXiOS KERNEL]: Geçersiz giriş denemesi.");
                alert("ERİŞİM HATASI: Kullanıcı adı veya parola yanlış!");
            }
        }

        /**
         * 4. SHUTDOWN & REBOOT HANDLER
         * Sistemi güvenli bir şekilde kapatır ve oturumu sonlandırır.
         */
        function shutdownSequence() {
            const userConfirm = confirm("WAXiOS Güvenlik Uyarısı:\nSistem kapatılacaktır. Kaydedilmemiş veriler kaybolabilir. Devam edilsin mi?");
            
            if (userConfirm) {
                console.log("[WAXiOS KERNEL]: Kapatma komutu alındı.");
                location.reload(); 
            }
        }

        /**
         * 5. APPLICATION LAUNCHER FACTORY
         * Uygulama pencerelerini dinamik olarak oluşturur ve kernel'a kaydeder.
         */
        function initiateApplication(appName, appType) {
            console.log(`[WAXiOS KERNEL]: Başlatılıyor -> ${appName}`);
            
            const uniqueProcessId = 'process-id-' + Date.now();
            const appWindow = document.createElement('div');
            
            appWindow.className = 'system-window-frame';
            appWindow.id = uniqueProcessId;
            appWindow.style.zIndex = ++kernelZIndexBase;
            
            // Rastgele başlangıç koordinatları (Grid sistemine göre)
            const posX = 150 + (Math.random() * 140);
            const posY = 70 + (Math.random() * 90);
            appWindow.style.left = posX + "px";
            appWindow.style.top = posY + "px";

            let internalHtml = '';

            // UYGULAMA TİPİNE GÖRE İÇERİK OLUŞTURMA
            if (appType === 'draw-module') {
                internalHtml = `
                    <div class="draw-app-root">
                        <div class="draw-toolbar-top">
                            <button class="draw-action-btn" onclick="clearCanvasInternal(this)">SAYFAYI TEMİZLE</button>
                            <span style="color:#777;">Renk:</span>
                            <input type="color" class="brush-color-target" value="#ff007a">
                            <span style="color:#777;">Kalınlık:</span>
                            <input type="range" class="brush-size-target" min="1" max="60" value="12">
                        </div>
                        <div style="flex:1; background:#ffffff; position:relative; overflow:hidden;">
                            <canvas class="surface-canvas"></canvas>
                        </div>
                    </div>`;
            } else if (appType === 'audio-module') {
                internalHtml = `
                    <div class="player-root-interface">
                        <div class="player-visualizer-orb">🎵</div>
                        <h1 style="color:var(--primary-accent); margin-bottom:10px; font-size:40px;">WaxiMusic</h1>
                        <p style="color:#555; margin-bottom:30px; letter-spacing:2px;">Kritik Sistem Ses Servisi</p>
                        <audio loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>
                        <button style="background:var(--primary-accent); color:white; border:none; padding:18px 50px; border-radius:35px; cursor:pointer; font-weight:950; box-shadow:0 0 30px var(--primary-accent-glow);" 
                                onclick="const p=this.previousElementSibling; p.paused ? p.play() : p.pause()">PLAY / PAUSE</button>
                    </div>`;
            } else if (appType === 'file-module') {
                internalHtml = `
                    <div style="padding:50px; background:#0a0a0a; height:100%; color:#ffffff;">
                        <h2 style="border-bottom:2px solid var(--primary-accent); padding-bottom:20px;">Sistem Birimi (W:)</h2>
                        <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:40px; margin-top:40px; text-align:center;">
                            <div><span style="font-size:50px;">📁</span><p style="margin-top:10px;">Belgeler</p></div>
                            <div><span style="font-size:50px;">📁</span><p style="margin-top:10px;">Resimler</p></div>
                            <div><span style="font-size:50px;">📁</span><p style="margin-top:10px;">Kernel_Logs</p></div>
                        </div>
                    </div>`;
            } else {
                // GOOGLE TARAYICI VE BYPASS MOTORU
                internalHtml = `
                    <div class="browser-container-root">
                        <div class="browser-nav-header">
                            <span style="color:#555; font-weight:bold; font-size:12px;">URL:</span>
                            <input type="text" value="${appType}" class="url-input-field" placeholder="Adres veya Arama Giriniz...">
                            <button class="nav-execute-btn" onclick="executeSecureNavigation(this)">GİT</button>
                        </div>
                        <iframe src="${appType}" class="waxi-iframe-core-bridge" style="flex:1; border:none; background:#ffffff;"></iframe>
                    </div>`;
            }

            // PENCERE YAPISINI BİRLEŞTİRME
            appWindow.innerHTML = `
                <div class="window-header-drag-zone" onmousedown="initiateWindowDrag(this)">
                    <span class="window-title-label">${appName}</span>
                    <div class="window-action-buttons">
                        <div class="action-dot dot-minimize" title="Arka Plana At (Sarı Tuş)" onclick="minimizeProcess('${uniqueProcessId}')"></div>
                        <div class="action-dot dot-close" title="Kapat" onclick="terminateProcess('${uniqueProcessId}')"></div>
                    </div>
                </div>
                <div class="window-internal-body">${internalHtml}</div>`;
            
            // DOM ENJEKSİYONU
            document.body.appendChild(appWindow);
            
            // GÖREV ÇUBUĞU KAYDI
            registerProcessToTaskbar(uniqueProcessId, appName);
            
            // ÖZEL MODÜL BAŞLATICILAR
            if (appType === 'draw-module') {
                runCanvasLogic(appWindow);
            }
        }

        /**
         * 6. ADVANCED NAVIGATION ENGINE (PROXY BYPASS)
         * Google üzerinden girilen ve engellenen siteleri kurtaran çekirdek fonksiyon.
         */
        function executeSecureNavigation(btnRef) {
            const inputRef = btnRef.parentElement.querySelector('.url-input-field');
            const iframeRef = btnRef.parentElement.parentElement.querySelector('iframe');
            
            let targetUrl = inputRef.value.trim();
            
            // HTTP/HTTPS PROTOKOL KONTROLÜ
            if (!targetUrl.startsWith('http')) {
                targetUrl = 'https://' + targetUrl;
            }

            // BYPASS LOGIC: Eğer site Google değilse, Proxy katmanını kullan.
            // Bu sayede "kali.org" gibi siteler iframe engelini aşar.
            if (!targetUrl.includes("google.com")) {
                console.log("[WAXiOS NETWORK]: Proxy Bypass protokolü aktif.");
                iframeRef.src = "https://api.allorigins.win/raw?url=" + encodeURIComponent(targetUrl);
            } else {
                iframeRef.src = targetUrl;
            }
        }

        /**
         * 7. TASKBAR PROCESS MANAGEMENT
         * Görev çubuğu sekmelerini ve pencere görünürlüğünü yönetir.
         */
        function registerProcessToTaskbar(id, label) {
            const taskTab = document.createElement('div');
            taskTab.className = 'taskbar-item-tab';
            taskTab.id = 'taskbar-ref-' + id;
            taskTab.innerText = label;
            
            taskTab.onclick = function() {
                const targetWindow = document.getElementById(id);
                if (targetWindow) {
                    targetWindow.style.display = 'flex';
                    targetWindow.style.zIndex = ++kernelZIndexBase;
                }
            };
            
            uiTaskList.appendChild(taskTab);
        }

        function minimizeProcess(id) {
            const win = document.getElementById(id);
            if (win) {
                win.style.display = 'none';
                console.log(`[WAXiOS KERNEL]: ${id} süreci arka plana alındı.`);
            }
        }

        function terminateProcess(id) {
            const win = document.getElementById(id);
            const tab = document.getElementById('taskbar-ref-' + id);
            
            if (win) win.remove();
            if (tab) tab.remove();
            console.log(`[WAXiOS KERNEL]: ${id} süreci sonlandırıldı.`);
        }

        /**
         * 8. WAXIDRAW CORE LOGIC
         * Gelişmiş çizim ve koordinat takip motoru.
         */
        function runCanvasLogic(winRef) {
            const canvas = winRef.querySelector('canvas');
            const ctx = canvas.getContext('2d');
            
            // Çözünürlük ve boyut ayarları
            canvas.width = 1050;
            canvas.height = 640;
            
            let activePainting = false;

            const startDrawing = (e) => {
                activePainting = true;
                ctx.beginPath();
                processDrawing(e);
            };

            const endDrawing = () => {
                activePainting = false;
                ctx.beginPath();
            };

            const processDrawing = (e) => {
                if (!activePainting) return;
                
                const bound = canvas.getBoundingClientRect();
                const posX = (e.clientX || e.touches[0].clientX) - bound.left;
                const posY = (e.clientY || e.touches[0].clientY) - bound.top;
                
                const brushSize = winRef.querySelector('.brush-size-target').value;
                const brushColor = winRef.querySelector('.brush-color-target').value;

                ctx.lineWidth = brushSize;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.strokeStyle = brushColor;
                
                ctx.lineTo(posX, posY);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(posX, posY);
            };

            // Olay dinleyicileri (Mouse + Touch uyumlu)
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mouseup', endDrawing);
            canvas.addEventListener('mousemove', processDrawing);
            
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchend', endDrawing);
            canvas.addEventListener('touchmove', processDrawing);
        }

        function clearCanvasInternal(btn) {
            const cv = btn.closest('.system-window-frame').querySelector('canvas');
            const c = cv.getContext('2d');
            c.clearRect(0, 0, cv.width, cv.height);
        }

        /**
         * 9. WINDOW DRAG HANDLER
         * Pencerelerin masaüstünde serbestçe hareket etmesini sağlar.
         */
        function initiateWindowDrag(headerRef) {
            const targetWindow = headerRef.parentElement;
            
            headerRef.onmousedown = function(e) {
                // Eğer pencere kontrollerine tıklandıysa sürüklemeyi başlatma
                if (e.target.className.includes('action-dot')) return;
                
                targetWindow.style.zIndex = ++kernelZIndexBase;
                
                const diffX = e.clientX - targetWindow.offsetLeft;
                const diffY = e.clientY - targetWindow.offsetTop;
                
                const onMouseMove = (ev) => {
                    targetWindow.style.left = (ev.clientX - diffX) + 'px';
                    targetWindow.style.top = (ev.clientY - diffY) + 'px';
                };
                
                const onMouseUp = () => {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.removeEventListener('mouseup', onMouseUp);
                };
                
                document.addEventListener('mousemove', onMouseMove);
                document.addEventListener('mouseup', onMouseUp);
            };
        }

        /**
         * 10. SYSTEM CLOCK SERVICE
         * Görev çubuğundaki zamanlayıcıyı saniyelik olarak günceller.
         */
        setInterval(() => {
            const clockNode = document.getElementById('system-clock-display');
            if (clockNode) {
                const now = new Date();
                clockNode.innerText = now.toLocaleTimeString('tr-TR', {
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit'
                });
            }
        }, 1000);
